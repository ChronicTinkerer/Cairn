name: Feature request
description: Propose a new feature, API addition, or significant enhancement to a Cairn library.
title: "[Feature] "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Cairn deliberately stays small. Read the
        [Roadmap](https://github.com/ChronicTinkerer/cairn/wiki/Roadmap)
        and the README's "Explicitly NOT planned" section before filing —
        not every addition fits Cairn's scope.

  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the consumer-side pain point, not the proposed solution.
      placeholder: |
        I want to debounce a settings save so rapid sliders don't write
        SavedVariables 60 times per second. Today I have to roll my own
        timer-with-name helper.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Sketch the API. Code samples encouraged.
      placeholder: |
        Add `Cairn.Timer:Schedule(name, seconds, fn, owner)` that replaces
        any existing timer with the same name (debounce primitive).
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you considered
      description: Why isn't `Cairn.Timer:After + manual cancel` enough? Why not just keep this in your own addon?
      placeholder: |
        - Roll my own per-name debounce helper.
        - Use `C_Timer.NewTimer` directly + a name->handle table.
        - Either works, but every addon ends up writing this.

  - type: dropdown
    id: lib
    attributes:
      label: Which library does this belong to?
      description: Pick the closest. "New library" is fine if nothing fits.
      options:
        - Cairn.Events
        - Cairn.Log
        - Cairn.LogWindow
        - Cairn.DB
        - Cairn.Settings
        - Cairn.Addon
        - Cairn.Slash
        - Cairn.EditMode
        - Cairn.Locale
        - Cairn.Hooks
        - Cairn.Sequencer
        - Cairn.Timer
        - Cairn.FSM
        - Cairn.Comm
        - Cairn-Gui-2.0 (widget toolkit)
        - New library
        - Not sure
    validations:
      required: true

  - type: textarea
    id: backwards-compat
    attributes:
      label: Backwards compatibility
      description: Does this break any existing API? Can it ship as a non-breaking MINOR bump?
      placeholder: "Pure addition; existing :After / :NewTicker unaffected."

  - type: checkboxes
    id: tried
    attributes:
      label: Sanity checks
      options:
        - label: I checked the [Roadmap](https://github.com/ChronicTinkerer/cairn/wiki/Roadmap) and "Explicitly NOT planned" section.
        - label: I searched existing issues for duplicates / prior discussions.
