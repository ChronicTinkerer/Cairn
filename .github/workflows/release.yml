name: Release

# Triggers on a pushed tag of any name. release.ps1 creates sequential
# integer tags (1, 2, 3, ...) and pushes them. Pushes to main do nothing.
on:
  push:
    tags:
      - "**"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Package and release
    runs-on: ubuntu-latest
    steps:
      - name: Clone project
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Package and release
        uses: BigWigsMods/packager@v2
        env:
          GITHUB_OAUTH: ${{ secrets.GITHUB_TOKEN }}

          # Per-site upload tokens. Set as repo secrets in
          # GitHub -> Settings -> Secrets and variables -> Actions.
          # If a token is missing, the packager skips that site.
          CF_API_KEY:        ${{ secrets.CF_API_KEY }}
          WAGO_API_TOKEN:    ${{ secrets.WAGO_API_TOKEN }}
          WOWI_API_TOKEN:    ${{ secrets.WOWI_API_TOKEN }}
